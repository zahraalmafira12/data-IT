<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data IT - IT Asset Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        .nav-link.active { background-color: #2563eb; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        .btn-pro { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-pro:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .sidebar-btn:hover { background-color: #1e293b; padding-left: 1.25rem; }
        .warning-expiry { background-color: #451a03 !important; color: #fbbf24; }
        .danger-expiry { background-color: #450a0a !important; color: #f87171; }
        .status-received { background-color: #064e3b; color: #34d399; border: 1px solid #059669; padding: 2px 10px; border-radius: 9999px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .status-pending { background-color: #451a03; color: #fbbf24; border: 1px solid #d97706; padding: 2px 10px; border-radius: 9999px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        tr:hover { background-color: rgba(30, 41, 59, 0.5); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        
        .check-item:checked + label { background-color: rgba(37, 99, 235, 0.1) !important; border-color: #3b82f6 !important; }
        .check-item:checked + label .check-icon { background-color: #3b82f6 !important; border-color: #3b82f6 !important; }
        .check-item:checked + label .check-icon i { display: block !important; }

        .autocomplete-suggestions { position: absolute; z-index: 1000; background: white; border: 1px solid #e2e8f0; border-radius: 8px; max-height: 150px; overflow-y: auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; }
        .suggestion-item { padding: 8px 12px; cursor: pointer; font-size: 12px; color: #1e293b; }
        .suggestion-item:hover { background-color: #f1f5f9; color: #2563eb; }

        /* Style Khusus Login */
        #login-screen {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
    </style>
</head>
<body class="bg-[#020617] font-sans text-slate-200">

    <div id="login-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="mb-8 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-[0_0_30px_rgba(37,99,235,0.5)]">
                <i class="fas fa-database text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tighter">DATA <span class="text-blue-500">IT</span></h1>
            <p class="text-slate-500 text-sm mt-2">IT Asset Management System</p>
        </div>
        
        <button onclick="handleLogin()" class="group relative px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-widest rounded-2xl transition-all shadow-[0_10px_20px_-5px_rgba(37,99,235,0.4)] active:scale-95">
            <span class="flex items-center">
                <i class="fas fa-lock-open mr-3 transition-transform group-hover:rotate-12"></i>
                Buka DATA IT
            </span>
        </button>
        <p class="mt-10 text-[10px] text-slate-700 uppercase tracking-widest font-bold">Authorized Personnel Only</p>
    </div>

    <div id="main-dashboard" class="flex h-screen overflow-hidden opacity-0 pointer-events-none transition-opacity duration-500">
        <aside class="w-64 bg-slate-950 text-white flex-shrink-0 hidden md:flex flex-col shadow-2xl border-r border-slate-800">
            <div class="p-6 text-2xl font-bold border-b border-slate-800 flex items-center">
                <i class="fas fa-database text-blue-500 mr-3"></i>
                <span>Data <span class="text-blue-500">IT</span></span>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="#" onclick="switchMenu('Dashboard')" class="nav-link sidebar-btn flex items-center p-3 rounded-lg active"><i class="fas fa-home mr-3 text-blue-500"></i> Dashboard</a>
                <a href="#" onclick="switchMenu('Data Pembelian Barang')" class="nav-link sidebar-btn flex items-center p-3 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-shopping-cart mr-3 text-blue-500"></i> Data Pembelian Barang</a>
                <a href="#" onclick="switchMenu('Inventori')" class="nav-link sidebar-btn flex items-center p-3 hover:bg-slate-900 rounded-lg transition ml-4 border-l border-slate-800 text-sm"><i class="fas fa-archive mr-3 text-blue-500"></i> Inventori</a>
                <a href="#" onclick="switchMenu('Data Stok')" class="nav-link sidebar-btn flex items-center p-3 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-boxes mr-3 text-blue-500"></i> Data Stok</a>
                <a href="#" onclick="switchMenu('Check-in / Out')" class="nav-link sidebar-btn flex items-center p-3 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-exchange-alt mr-3 text-blue-500"></i> Check-in / Out</a>
                <a href="#" onclick="switchMenu('Lisensi Software')" class="nav-link sidebar-btn flex items-center p-3 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-file-code mr-3 text-blue-500"></i> Lisensi Software</a>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <a href="#" onclick="handleLogout()" class="flex items-center p-3 text-rose-500 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-sign-out-alt mr-3"></i> Keluar</a>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-[#020617]">
            <header class="bg-slate-950/50 backdrop-blur-md border-b border-slate-800 p-4 flex justify-between items-center sticky top-0 z-10">
                <h2 id="page-title" class="text-xl font-bold text-white tracking-tight">Dashboard</h2>
                <div class="flex items-center space-x-3">
                    <button id="export-btn" onclick="exportToExcel()" class="btn-pro bg-emerald-600 text-white px-5 py-2.5 rounded-lg font-semibold hidden items-center shadow-lg">
                        <i class="fas fa-file-excel mr-2"></i> Export Excel
                    </button>
                    <button id="add-btn" onclick="toggleModal()" class="btn-pro bg-blue-600 text-white px-5 py-2.5 rounded-lg font-semibold flex items-center shadow-lg">
                        <i class="fas fa-plus-circle mr-2"></i> <span id="add-btn-text">Tambah Aset</span>
                    </button>
                </div>
            </header>

            <div class="p-6 space-y-6">
                <div id="dashboard-graphics" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900/50 p-6 rounded-2xl shadow-sm border border-slate-800">
                        <h4 class="text-sm font-bold text-slate-400 mb-4 uppercase">Grafik Stok</h4>
                        <div class="relative h-64"><canvas id="stokChart"></canvas></div>
                    </div>
                    <div class="bg-slate-900/50 p-6 rounded-2xl shadow-sm border border-slate-800">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-sm font-bold text-slate-400 uppercase">Pembelian Barang</h4>
                            <select id="beliChartFilter" onchange="initCharts()" class="bg-slate-800 text-[10px] font-bold text-blue-400 border border-slate-700 rounded px-2 py-1 outline-none">
                                <option value="minggu">Perminggu</option>
                                <option value="bulan">Perbulan</option>
                                <option value="tahun">Pertahun</option>
                            </select>
                        </div>
                        <div class="relative h-64"><canvas id="beliChart"></canvas></div>
                    </div>
                </div>
                <div id="content-section" class="bg-slate-900/50 rounded-2xl shadow-sm border border-slate-800 overflow-hidden hidden"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none modal transition-all duration-300">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="toggleModal()"></div>
        <div class="bg-white rounded-2xl shadow-2xl z-50 w-full max-w-4xl mx-4 overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h3 id="modal-title" class="text-lg font-bold text-gray-800 tracking-tight">Tambah Data</h3>
                <button onclick="toggleModal()" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <form id="assetForm" class="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                <input type="hidden" id="edit-index" value="-1">
                <div id="dynamic-inputs" class="space-y-4 text-gray-800"></div>
                <div class="pt-4 flex gap-3 sticky bottom-0 bg-white">
                    <button type="button" onclick="toggleModal()" class="flex-1 bg-gray-100 text-gray-600 py-3.5 rounded-xl font-bold uppercase tracking-widest">Batal</button>
                    <button type="submit" class="flex-[2] btn-pro bg-slate-900 text-white py-3.5 rounded-xl font-bold uppercase tracking-widest shadow-lg">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-terima" class="fixed inset-0 z-[60] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="closeModalTerima()"></div>
        <div class="bg-white rounded-2xl shadow-2xl z-[70] w-full max-w-md mx-4 overflow-hidden">
            <div class="p-6 border-b flex items-center justify-between bg-gray-50">
                <h3 class="font-bold text-gray-800 tracking-tight uppercase text-sm">Update Penerimaan Barang</h3>
                <button onclick="closeModalTerima()" class="text-gray-400 hover:text-red-500 text-xl">&times;</button>
            </div>
            <form id="receiveForm" class="p-6 space-y-5 text-gray-800">
                <input type="hidden" id="receive-index">
                <div id="rec-checkbox-list" class="space-y-2 max-h-48 overflow-y-auto p-1"></div>
                <div class="grid grid-cols-1 gap-4">
                    <input type="date" id="rec-date" required class="w-full p-3 bg-gray-50 border rounded-xl outline-none font-medium text-sm">
                    <select id="rec-cond" class="w-full p-3 bg-gray-50 border rounded-xl outline-none font-medium text-sm">
                        <option value="Bagus / New (Sesuai)">👍 Bagus / New (Sesuai)</option>
                        <option value="Rusak / Cacat Produksi">⚠️ Rusak / Cacat Produksi</option>
                        <option value="Box Rusak / Barang Aman">📦 Box Rusak / Barang Aman</option>
                        <option value="Jumlah Kurang">📉 Jumlah Kurang</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeModalTerima()" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-xl font-bold uppercase tracking-widest">Batal</button>
                    <button type="submit" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg">Simpan Update</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // FUNGSI LOGIN / LOGOUT
        function handleLogin() {
            const loginScreen = document.getElementById('login-screen');
            const dashboard = document.getElementById('main-dashboard');
            
            loginScreen.classList.add('opacity-0', 'pointer-events-none');
            dashboard.classList.remove('opacity-0', 'pointer-events-none');
            
            // Inisialisasi Chart saat masuk
            setTimeout(() => { switchMenu('Dashboard'); }, 300);
        }

        function handleLogout() {
            const loginScreen = document.getElementById('login-screen');
            const dashboard = document.getElementById('main-dashboard');
            
            dashboard.classList.add('opacity-0', 'pointer-events-none');
            loginScreen.classList.remove('opacity-0', 'pointer-events-none');
        }

        // DATABASE & LOGIK DASHBOARD ASLI ANDA (Sama Persis)
        let dbStok = []; let dbKeluar = []; let dbSoft = []; let dbBeli = []; let dbInventori = []; 
        let currentMenu = 'Dashboard'; let charts = {};

        function switchMenu(menu) {
            currentMenu = menu;
            document.getElementById('page-title').innerText = menu;
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active', 'bg-blue-600');
                if(link.innerText.includes(menu)) link.classList.add('active', 'bg-blue-600');
            });
            const dashGraphics = document.getElementById('dashboard-graphics');
            const contentSec = document.getElementById('content-section');
            const addBtn = document.getElementById('add-btn');
            const exportBtn = document.getElementById('export-btn');
            const addBtnText = document.getElementById('add-btn-text');

            if(menu === 'Dashboard') {
                dashGraphics.classList.remove('hidden'); contentSec.classList.add('hidden');
                addBtn.style.display = 'none'; exportBtn.classList.add('hidden'); exportBtn.classList.remove('flex');
                initCharts();
            } else {
                dashGraphics.classList.add('hidden'); contentSec.classList.remove('hidden'); addBtn.style.display = 'block';
                if(menu === 'Data Pembelian Barang') { addBtnText.innerText = 'Tambah Pembelian'; exportBtn.classList.remove('hidden'); exportBtn.classList.add('flex'); }
                else {
                    exportBtn.classList.add('hidden'); exportBtn.classList.remove('flex');
                    if(menu === 'Inventori') addBtnText.innerText = 'Tambah Item Baru';
                    else if(menu === 'Data Stok') addBtnText.innerText = 'Tambah Aset';
                    else if(menu === 'Check-in / Out') addBtnText.innerText = 'Tambah Transaksi';
                    else if(menu === 'Lisensi Software') addBtnText.innerText = 'Tambah Lisensi';
                }
                renderView();
            }
        }

        function exportToExcel() {
            if (dbBeli.length === 0) { alert("Tidak ada data untuk diekspor!"); return; }
            const dataToExport = [];
            dbBeli.forEach((pr, prIdx) => {
                pr.items.forEach((item, itemIdx) => {
                    dataToExport.push({
                        "NO": itemIdx === 0 ? prIdx + 1 : "", 
                        "KODE PR / PO": itemIdx === 0 ? pr.code : "", 
                        "TANGGAL PENGAJUAN": itemIdx === 0 ? pr.dateSubmit : "",
                        "NAMA BARANG": item.name,
                        "QTY": item.qty,
                        "ESTIMASI HARGA": formatIDR(item.price || 0),
                        "ALASAN PEMBELIAN": item.reason || "-",
                        "STATUS PENERIMAAN": item.received ? "DITERIMA" : "PENDING",
                        "TGL TERIMA": (itemIdx === 0 && pr.dateRec) ? pr.dateRec : "-",
                        "KONDISI": (itemIdx === 0 && pr.cond) ? pr.cond : "-"
                    });
                });
            });
            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            worksheet['!cols'] = [{wch:5}, {wch:20}, {wch:18}, {wch:30}, {wch:8}, {wch:18}, {wch:35}, {wch:15}, {wch:15}, {wch:25}];
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "LAPORAN PEMBELIAN");
            XLSX.writeFile(workbook, `Laporan_Pembelian_IT_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        function initCharts() {
            const ctxStok = document.getElementById('stokChart').getContext('2d');
            const ctxBeli = document.getElementById('beliChart').getContext('2d');
            const filter = document.getElementById('beliChartFilter').value;
            if(charts.stok) charts.stok.destroy();
            if(charts.beli) charts.beli.destroy();
            Chart.defaults.color = '#94a3b8';
            charts.stok = new Chart(ctxStok, {
                type: 'doughnut',
                data: {
                    labels: ['Hardware', 'Part', 'Lainnya'],
                    datasets: [{
                        data: [dbStok.filter(i=>i.type==='Hardware').length, dbStok.filter(i=>i.type==='Part').length, dbStok.filter(i=>i.type!=='Hardware'&&i.type!=='Part').length],
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'],
                        borderWidth: 2, borderColor: '#0f172a'
                    }]
                },
                options: { maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
            });
            let labels = [], datasetData = [];
            if(filter === 'minggu') { labels = ['Minggu 1', 'Minggu 2', 'Minggu 3', 'Minggu 4']; datasetData = [dbBeli.length, 0, 0, 0]; }
            else if(filter === 'bulan') { 
                labels = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des']; datasetData = new Array(12).fill(0);
                dbBeli.forEach(item => { const m = new Date(item.dateSubmit).getMonth(); if(!isNaN(m)) datasetData[m]++; });
            } else { labels = ['2024', '2025', '2026']; datasetData = [0,0,0]; }
            charts.beli = new Chart(ctxBeli, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Total PR', data: datasetData, backgroundColor: '#3b82f6', borderRadius: 5 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' }, beginAtZero: true }, x: { grid: { display: false } } } }
            });
        }

        function setupAutocomplete(input) {
            let container = document.createElement('div'); container.className = 'autocomplete-suggestions hidden';
            input.parentNode.style.position = 'relative'; input.parentNode.appendChild(container);
            input.addEventListener('input', function() {
                let val = this.value.toLowerCase(); container.innerHTML = '';
                if (!val) { container.classList.add('hidden'); return; }
                let matches = dbInventori.filter(i => i.kode.toLowerCase().includes(val) || i.nama.toLowerCase().includes(val));
                if (matches.length > 0) {
                    matches.forEach(m => {
                        let item = document.createElement('div'); item.className = 'suggestion-item';
                        item.innerHTML = `<strong>${m.kode}</strong> - ${m.nama}`;
                        item.onclick = () => { input.value = m.nama; container.classList.add('hidden'); };
                        container.appendChild(item);
                    });
                    container.classList.remove('hidden');
                } else container.classList.add('hidden');
            });
        }

        function formatIDR(num) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num); }
        
        function renderView() {
            const container = document.getElementById('content-section');
            let html = `<table class="w-full text-left border-collapse"><thead class="bg-slate-950/80 text-[10px] uppercase text-slate-500 font-black border-b border-slate-800 tracking-[0.1em]"><tr>`;
            if(currentMenu === 'Data Pembelian Barang') html += `<th class="px-6 py-5">PR / PO Code</th><th class="px-6 py-5">Detail Barang & Alasan</th><th class="px-6 py-5">Tgl Diajukan</th><th class="px-6 py-5">Terima & Kondisi</th>`;
            else if(currentMenu === 'Inventori') html += `<th class="px-6 py-5">Kode ITEM</th><th class="px-6 py-5">Nama ITEM</th>`;
            else if(currentMenu === 'Data Stok') html += `<th class="px-6 py-5">Nama Barang</th><th class="px-6 py-5">Kategori</th><th class="px-6 py-5">Sisa Stok</th><th class="px-6 py-5">Tgl Masuk</th>`;
            else if(currentMenu === 'Check-in / Out') html += `<th class="px-6 py-5">Barang Keluar</th><th class="px-6 py-5">USER</th><th class="px-6 py-5">Jumlah</th><th class="px-6 py-5">Tanggal</th>`;
            else if(currentMenu === 'Lisensi Software') html += `<th class="px-6 py-5">Software</th><th class="px-6 py-5">Type/Fungsi</th><th class="px-6 py-5">Instal Di</th><th class="px-6 py-5">Berhenti</th>`;
            html += `<th class="px-6 py-5 text-center">Aksi</th></tr></thead><tbody class="divide-y divide-slate-800 bg-transparent text-slate-300">`;
            let data = (currentMenu === 'Data Pembelian Barang') ? dbBeli : (currentMenu === 'Inventori') ? dbInventori : (currentMenu === 'Data Stok') ? dbStok : (currentMenu === 'Check-in / Out') ? dbKeluar : dbSoft;
            data.forEach((item, idx) => {
                html += `<tr>`;
                if(currentMenu === 'Data Pembelian Barang') {
                    html += `<td class="px-6 py-5 align-top"><div class="font-black text-white text-sm tracking-tight">${item.code}</div></td>`;
                    html += `<td class="px-6 py-5 align-top">`;
                    item.items.forEach(it => {
                        let badge = it.received ? '<span class="status-received">DI TERIMA</span>' : '<span class="status-pending">PENDING</span>';
                        html += `<div class="mb-2 p-3 bg-slate-950/40 border border-slate-800 rounded-xl group hover:border-blue-500/50 transition-all">
                            <div class="flex justify-between items-center mb-1 text-xs font-bold text-slate-300">${it.name} <span class="text-blue-500 ml-1">x${it.qty}</span> ${badge}</div>
                            <div class="text-[10px] text-blue-400 font-semibold"><i class="fas fa-comment-dots mr-1"></i> ${it.reason || '-'}</div>
                        </div>`;
                    });
                    html += `</td><td class="px-6 py-5 align-top font-bold text-slate-400">${item.dateSubmit}</td><td class="px-6 py-5 align-top">${(item.dateRec && item.dateRec !== '-') ? `<div class="bg-blue-600 inline-block px-2 py-0.5 text-white font-black rounded text-[9px] uppercase">${item.dateRec}</div>` : 'Belum Ada'}</td><td class="px-6 py-5 text-center align-top space-x-3"><button onclick="openModalTerima(${idx})" class="p-2 bg-emerald-900/20 text-emerald-500 rounded-lg"><i class="fas fa-box-open"></i></button><button onclick="editData(${idx})" class="p-2 bg-blue-900/20 text-blue-400 rounded-lg"><i class="fas fa-pen"></i></button><button onclick="deleteRow(${idx})" class="p-2 bg-rose-900/20 text-rose-500 rounded-lg"><i class="fas fa-trash-alt"></i></button></td>`;
                } else {
                    Object.values(item).forEach(v => html += `<td class="px-6 py-5 font-bold text-slate-300 text-sm">${v}</td>`);
                    html += `<td class="px-6 py-5 text-center space-x-3"><button onclick="editData(${idx})" class="p-2 bg-blue-900/20 text-blue-400 rounded-lg"><i class="fas fa-pen"></i></button><button onclick="deleteRow(${idx})" class="p-2 bg-rose-900/20 text-rose-500 rounded-lg"><i class="fas fa-trash-alt"></i></button></td>`;
                }
                html += `</tr>`;
            });
            container.innerHTML = html + `</tbody></table>`;
        }

        function toggleModal() {
            const m = document.getElementById('modal'); const inputs = document.getElementById('dynamic-inputs');
            if(!m.classList.contains('opacity-0')) { m.classList.add('opacity-0', 'pointer-events-none'); return; }
            if(currentMenu === 'Data Pembelian Barang') {
                inputs.innerHTML = `<div class="grid grid-cols-2 gap-4"><div><label class="text-xs font-bold text-gray-500">Kode</label><input type="text" id="in1" required class="w-full p-3 bg-gray-50 border rounded-xl"></div><div><label class="text-xs font-bold text-gray-500">Tgl</label><input type="date" id="in2" required class="w-full p-3 bg-gray-50 border rounded-xl"></div></div><div id="list-items" class="space-y-4"></div><button type="button" onclick="addItemField()" class="text-xs font-bold text-blue-600">+ Tambah Barang</button>`;
                addItemField();
            } else if(currentMenu === 'Inventori') {
                inputs.innerHTML = `<div><label class="text-xs font-bold text-gray-500 uppercase">Kode ITEM</label><input type="text" id="in1" required class="w-full p-3 bg-gray-50 border rounded-xl"></div><div><label class="text-xs font-bold text-gray-500 uppercase">Nama ITEM</label><input type="text" id="in2" required class="w-full p-3 bg-gray-50 border rounded-xl"></div>`;
            } else if(currentMenu === 'Data Stok') {
                inputs.innerHTML = `<input type="text" id="in1" placeholder="Nama Barang" required class="w-full p-3 bg-gray-50 border rounded-xl"><select id="in2" class="w-full p-3 bg-gray-50 border rounded-xl"><option>Hardware</option><option>Part</option><option>Lainnya</option></select><div class="grid grid-cols-2 gap-4"><input type="number" id="in3" placeholder="Qty" required class="w-full p-3 bg-gray-50 border rounded-xl"><input type="date" id="in4" required class="w-full p-3 bg-gray-50 border rounded-xl"></div>`;
            }
            m.classList.remove('opacity-0', 'pointer-events-none');
        }

        function addItemField(name='', qty='', price='', reason='') {
            const div = document.createElement('div'); div.className = 'item-row bg-white p-3 border border-blue-100 rounded-lg space-y-2';
            div.innerHTML = `<div class="flex gap-2"><input type="text" value="${name}" placeholder="Barang" class="item-name flex-1 p-2 border rounded-lg"><input type="number" value="${qty}" placeholder="Qty" class="item-qty w-16 p-2 border rounded-lg"><input type="number" value="${price}" placeholder="Harga" class="item-price w-28 p-2 border rounded-lg"></div><input type="text" value="${reason}" placeholder="Alasan..." class="item-reason w-full p-2 text-[11px] border-dashed border rounded-lg">`;
            document.getElementById('list-items').appendChild(div);
            setupAutocomplete(div.querySelector('.item-name'));
        }

        function openModalTerima(idx) {
            const data = dbBeli[idx]; const list = document.getElementById('rec-checkbox-list'); list.innerHTML = '';
            data.items.forEach((it, i) => {
                const isRec = it.received || false;
                const d = document.createElement('div'); d.className = 'mb-2';
                d.innerHTML = `<input type="checkbox" id="check-item-${i}" class="check-item hidden" ${isRec ? 'checked' : ''}><label for="check-item-${i}" class="flex items-center justify-between p-4 border-2 rounded-xl cursor-pointer ${isRec ? 'bg-blue-50 border-blue-600' : 'bg-white border-gray-100'}"><div class="flex items-center"><div class="check-icon w-5 h-5 flex items-center justify-center border-2 rounded-md mr-3 ${isRec ? 'bg-blue-600 border-blue-600' : 'border-gray-300'}"><i class="fas fa-check text-[10px] text-white ${isRec ? '' : 'hidden'}"></i></div><span class="text-slate-700 font-bold text-xs">${it.name} x${it.qty}</span></div></label>`;
                list.appendChild(d);
            });
            document.getElementById('receive-index').value = idx;
            document.getElementById('modal-terima').classList.remove('hidden');
        }

        function closeModalTerima() { document.getElementById('modal-terima').classList.add('hidden'); }

        document.getElementById('receiveForm').addEventListener('submit', function(e) {
            e.preventDefault(); const idx = document.getElementById('receive-index').value; const checks = document.querySelectorAll('.check-item');
            dbBeli[idx].items.forEach((it, i) => { it.received = checks[i].checked; });
            dbBeli[idx].dateRec = document.getElementById('rec-date').value;
            closeModalTerima(); renderView();
        });

        document.getElementById('assetForm').addEventListener('submit', function(e) {
            e.preventDefault(); const editIdx = parseInt(document.getElementById('edit-index').value);
            const v1 = document.getElementById('in1').value; const v2 = document.getElementById('in2') ? document.getElementById('in2').value : null;
            if(currentMenu === 'Data Pembelian Barang') {
                let itemsList = []; document.querySelectorAll('#list-items .item-row').forEach((row, i) => {
                    let n = row.querySelector('.item-name').value; let q = parseInt(row.querySelector('.item-qty').value); let p = parseInt(row.querySelector('.item-price').value); let r = row.querySelector('.item-reason').value;
                    if(n) itemsList.push({ name: n, qty: q, price: p, reason: r, received: (editIdx !== -1 && dbBeli[editIdx].items[i]) ? dbBeli[editIdx].items[i].received : false });
                });
                let obj = { code: v1, dateSubmit: v2, items: itemsList, dateRec: (editIdx !== -1 ? dbBeli[editIdx].dateRec : '-') };
                if(editIdx === -1) dbBeli.push(obj); else dbBeli[editIdx] = obj;
                toggleModal(); renderView();
            } else if(currentMenu === 'Inventori') {
                let obj = { kode: v1, nama: v2 }; if(editIdx === -1) dbInventori.push(obj); else dbInventori[editIdx] = obj;
                toggleModal(); renderView();
            } else if(currentMenu === 'Data Stok') {
                let obj = { nama: v1, type: document.getElementById('in2').value, qty: parseInt(document.getElementById('in3').value), tgl: document.getElementById('in4').value };
                if(editIdx === -1) dbStok.push(obj); else dbStok[editIdx] = obj;
                toggleModal(); renderView();
            }
        });

        function deleteRow(idx) { if(confirm("Hapus?")) { if(currentMenu === 'Data Pembelian Barang') dbBeli.splice(idx,1); else if(currentMenu === 'Inventori') dbInventori.splice(idx,1); else if(currentMenu === 'Data Stok') dbStok.splice(idx,1); renderView(); } }
    </script>
</body>
</html>
